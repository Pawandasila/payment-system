services:
  - type: web
    name: playto-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: playto-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery worker -l info
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: playto-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playto-redis
          property: connectionString

  - type: worker
    name: playto-beat
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery beat -l info
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: playto-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playto-redis
          property: connectionString

  - type: web
    name: playto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: keyvalue
    name: playto-redis
    plan: free
    ipAllowList: []

databases:
  - name: playto-postgres
    plan: free
